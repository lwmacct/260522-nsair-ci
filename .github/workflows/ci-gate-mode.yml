name: Nsair CI Gate Mode

on:
  workflow_dispatch:
    inputs:
      nsair_image:
        description: Public Nsair image containing nsair-daemon and nsair-runtime
        required: true
        default: ghcr.io/lwmacct/260522-nsair:latest
        type: string
      debug_tmate:
        description: Open an interactive SSH session before setup
        required: true
        default: false
        type: boolean
      debug_workload:
        description: Workload that opens tmate when debug_tmate is true
        required: true
        default: procfs-cpu
        type: string
      workload_group:
        description: Workload group to run
        required: true
        default: default
        type: choice
        options:
          - default
          - extended
          - all
          - custom
      workloads:
        description: Space-separated workloads, used when workload_group is custom
        required: false
        default: ""
        type: string

concurrency:
  group: nsair-ci-gate-mode-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NSAIR_GATE_MODE: ci
  NSAIR_CI_TEST_ROOT: /tmp/nsair
  NSAIR_CI_IMAGE_CACHE_DIR: /tmp/nsair/images
  NSAIR_IMAGE: ${{ inputs.nsair_image || 'ghcr.io/lwmacct/260522-nsair:latest' }}

jobs:
  prepare:
    name: Prepare workload matrix
    runs-on: ubuntu-24.04
    outputs:
      workloads: ${{ steps.matrix.outputs.workloads }}
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v7.0.0

      - name: Build workload matrix
        id: matrix
        env:
          WORKLOAD_GROUP: ${{ inputs.workload_group || 'default' }}
          CUSTOM_WORKLOADS: ${{ inputs.workloads || '' }}
        run: |
          python3 - <<'PY' >>"$GITHUB_OUTPUT"
          import json
          import os
          import pathlib
          import shlex
          import sys

          root = pathlib.Path("ci/runtime/test/workloads")
          available = sorted(path.name for path in root.iterdir() if (path / "run.sh").is_file())
          groups = {
              "default": ["procfs-cpu", "procfs-memory", "seccomp-notify-concurrency"],
              "extended": [
                  "procfs-cpu",
                  "procfs-memory",
                  "seccomp-notify-concurrency",
                  "systemd-pid1",
                  "docker-in-docker",
                  "kubernetes-k3s",
              ],
              "all": available,
          }
          group = os.environ.get("WORKLOAD_GROUP", "default").strip() or "default"
          if group == "custom":
              workloads = shlex.split(os.environ.get("CUSTOM_WORKLOADS", ""))
          elif group in groups:
              workloads = groups[group]
          else:
              print(f"unknown workload_group: {group}", file=sys.stderr)
              sys.exit(2)
          if not workloads:
              print("no workloads selected", file=sys.stderr)
              sys.exit(2)
          unknown = [workload for workload in workloads if workload not in available]
          if unknown:
              print(f"unknown workloads: {', '.join(unknown)}", file=sys.stderr)
              print(f"available workloads: {', '.join(available)}", file=sys.stderr)
              sys.exit(2)
          print(f"workloads={json.dumps(workloads)}")
          PY

  runtime-test:
    name: Runtime workload / ${{ matrix.workload }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 7
      matrix:
        workload: ${{ fromJson(needs.prepare.outputs.workloads) }}
    env:
      NSAIR_WORKLOAD_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.workload }}
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v7.0.0

      - name: Open tmate session
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_tmate && matrix.workload == inputs.debug_workload }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Install ORAS
        env:
          ORAS_VERSION: 1.3.2
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install
          tar -zxf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" -C oras-install
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras-install
          oras version

      - name: Install dependencies
        run: bash scripts/ci.sh install-dependencies

      - name: Show host capabilities
        run: bash scripts/ci.sh show-host-capabilities

      - name: Setup Nsair runtime host
        run: bash scripts/ci.sh setup-runtime-host

      - name: Verify CI gate mode
        run: bash scripts/ci.sh verify-gate

      - name: Run runtime workload
        run: bash scripts/ci.sh run-workload "${{ matrix.workload }}"

      - name: Collect logs
        if: always()
        run: bash scripts/ci.sh collect-logs

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nsair-runtime-${{ matrix.workload }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.NSAIR_CI_TEST_ROOT }}/runs/**/*.log
          if-no-files-found: ignore
